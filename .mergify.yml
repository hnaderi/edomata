pull_request_rules:
  - name: Automatic merge for dependency updates
    conditions:
      - "head~=update/"
      - "status-success~=post build"

      - or:
        - "author=hnaderi"
        - "author=guillaumebadin"
        - "author=scala-steward"
        - "author=scala-steward[bot]"
    actions:
      merge:
        method: squash
